# Mosquitto Broker Configuration for Lab Testing

persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout

# Listener 1 (Port 1883): Unsecured listener (Plaintext, Anonymous Allowed)
listener 1883
allow_anonymous true

# Listener 2 (Port 1884): Password-Secured listener (Plaintext, Authentication Required)
listener 1884
allow_anonymous false
password_file /mosquitto/config/dynamic/pwfile
acl_file /mosquitto/config/aclfile
